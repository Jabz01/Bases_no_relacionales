<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBLorpen</title>
    <link rel="stylesheet" href="./pensum.css">
</head>

<body>
    <section id="pensum-outer-container">
        <header id="pensum-header">-</header>
        <article id="pensum-inner-container">
            -
        </article>
    </section>

    <br />

    <section id="subject-info-outer-container">
        <header id="subject-info-header">-</header>
        <article id="subject-info-inner-container">
            Seleccione alguna materia
        </article>
    </section>

    <script src="./consts.js"></script>
    <script src="./pensum.js"></script>
    <script>
        const user_id = 1;
        const pensum_id = 1;
        let grupos;
        let materia;
        let pensum;

        function add_materia(grupo_id) {
            console.log(pensum, materia, grupo_id);

            fetch(`${PROCESS_CONSTS.api_url}/inscribir`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    grupo_id,
                    user_id,
                    pensum_id
                })
            })
        }

        function intHoratoString(hora) {
            return `${Math.floor(hora / 100)}:${hora % 100}`;
        }

        function show_subject_detail(id) {
            let penHeader = document.getElementById("subject-info-header");
            let penInnerCnt = document.getElementById("subject-info-inner-container");

            fetch(`${PROCESS_CONSTS.api_url}/materia/${id}`)
                .then(respuesta => respuesta.json())
                .then(mat => {
                    materia = mat;

                    penHeader.innerHTML = mat.nombre;

                    fetch(`${PROCESS_CONSTS.api_url}/grupos-materia/${id}`)
                        .then(respuesta => respuesta.json())
                        .then(gpr => {
                            grupos = gpr;
                            console.log(grupos);
                            penInnerCnt.innerHTML = `
                            <p>Creditos: ${mat.creditos}</p>
                            <p>Semestre sugerido: ${mat.semestre_sugerido}</p>
                            <p>Planes: ${mat.planes.map(p => `[${p.id}] ${p.nombre}`).join(", ")}</p>
                            ${grupos.map(g => `
                            <div class="subject-info-group-container" >
                                <p>Inscritos: ${g.inscritos.length}/${g.cupos_totales}</p>
                                <p>${g.horario.map(h => `[${h.dia}]: ${intHoratoString(h.hora_inicio)}-${intHoratoString(h.hora_fin)}`).join("</br>")}</p>
                                <button onclick="add_materia(${g.id})">Inscribir</button>
                            </div>
                            `).join("")}
                            `;
                        })
                        .catch(error => {
                            console.error("Error al conectar con la base de datos:", error);
                        });
                })
                .catch(error => {
                    console.error("Error al conectar con la base de datos:", error);
                    penInnerCnt.innerHTML = "<p>Error al cargar las materias.</p>";
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            let penHeader = document.getElementById("pensum-header");
            let penInnerCnt = document.getElementById("pensum-inner-container");

            penInnerCnt.innerHTML = "<p>Cargando plan de estudios...</p>";

            fetch(`${PROCESS_CONSTS.api_url}/arbol-completo/${pensum_id}`)
                .then(respuesta => respuesta.json())
                .then(plan => {
                    pensum = plan

                    let pen_html = pensum_HTML(plan, "show_subject_detail");

                    penHeader.innerHTML = pen_html.penHeader_innerHTML;
                    penInnerCnt.innerHTML = pen_html.penInnerCnt_innerHTML;
                })
                .catch(error => {
                    console.error("Error al conectar con la base de datos:", error);
                    penInnerCnt.innerHTML = "<p>Error al cargar las materias.</p>";
                });
        });
    </script>
</body>

</html>
